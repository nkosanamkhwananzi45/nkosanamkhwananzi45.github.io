name: Replace SANTS with ASSIGNMENTS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show all instances BEFORE replacement
        run: |
          echo "=============================="
          echo " INSTANCES FOUND (BEFORE)"
          echo "=============================="
          grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.html" \
            "SANTS" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            | sort
          echo ""
          TOTAL=$(grep -rl --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.html" \
            "SANTS" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            | wc -l)
          echo "Files affected: $TOTAL"

      - name: Replace SANTS with ASSIGNMENTS
        run: |
          # Replace exact case: SANTS → ASSIGNMENTS
          grep -rl --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.html" \
            "SANTS" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
          | xargs sed -i 's/SANTS/ASSIGNMENTS/g'

          echo "✅ Replacement complete"

      - name: Verify SANTS is gone
        run: |
          echo "=============================="
          echo " REMAINING INSTANCES (should be 0)"
          echo "=============================="
          REMAINING=$(grep -rl --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.html" \
            "SANTS" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            | wc -l)
          echo "Remaining files with SANTS: $REMAINING"
          if [ "$REMAINING" -gt 0 ]; then
            echo "⚠ Some instances remain:"
            grep -rn "SANTS" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist
          else
            echo "✅ All instances replaced successfully"
          fi

      - name: Package fixed files as artifact
        run: |
          mkdir -p /tmp/sants-fixed
          grep -rl --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.html" \
            "ASSIGNMENTS" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
          | while read f; do
            mkdir -p /tmp/sants-fixed/$(dirname $f)
            cp $f /tmp/sants-fixed/$f
          done
          cd /tmp/sants-fixed && zip -r /tmp/sants-replaced.zip .
          echo "=============================="
          echo " FILES INCLUDED IN ARTIFACT"
          echo "=============================="
          cd /tmp/sants-fixed && find . -type f | sort

      - name: Upload fixed files
        uses: actions/upload-artifact@v4
        with:
          name: sants-replaced-files
          path: /tmp/sants-replaced.zip
          retention-days: 7
