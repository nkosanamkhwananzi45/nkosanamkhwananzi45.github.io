# ============================================================
# .github/workflows/dep-audit.yml
# AAC — Weekly Dependency Security & Freshness Audit
# Runs weekly + on-demand. Creates issues for critical CVEs.
# ============================================================
name: Dependency Audit

on:
  schedule:
    # Every Monday at 07:00 SAST (05:00 UTC)
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security-audit:
    name: 🛡 Security Audit (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # npm audit with JSON output for issue creation
      - name: npm audit (critical + high)
        id: audit
        run: |
          npm audit --json --omit=dev 2>/dev/null > audit-report.json || true
          
          CRITICAL=$(node -e "
            const r = require('./audit-report.json');
            const meta = r.metadata?.vulnerabilities || {};
            console.log(meta.critical || 0);
          ")
          HIGH=$(node -e "
            const r = require('./audit-report.json');
            const meta = r.metadata?.vulnerabilities || {};
            console.log(meta.high || 0);
          ")
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "- Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY
          
          node -e "
            const r = require('./audit-report.json');
            const vulns = r.vulnerabilities || {};
            Object.entries(vulns).forEach(([name, v]) => {
              if (v.severity === 'critical' || v.severity === 'high') {
                console.log(\`::warning::\${name} (\${v.severity}): \${v.via?.[0]?.title || 'vulnerability'}\`);
              }
            });
          "

      # Create GitHub issue for critical vulnerabilities
      - name: Create issue for critical vulnerabilities
        if: ${{ steps.audit.outputs.critical > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const vulns = report.vulnerabilities || {};
            
            let body = `## 🚨 Critical Security Vulnerabilities Detected\n\n`;
            body += `**Date:** ${new Date().toISOString().split('T')[0]}\n\n`;
            body += `| Package | Severity | Description | Fix |\n`;
            body += `|---------|----------|-------------|-----|\n`;
            
            Object.entries(vulns)
              .filter(([, v]) => v.severity === 'critical')
              .forEach(([name, v]) => {
                const via = Array.isArray(v.via) ? v.via[0] : v.via;
                const title = via?.title || 'Critical vulnerability';
                const fixAvail = v.fixAvailable ? '`npm audit fix`' : 'Manual fix required';
                body += `| \`${name}\` | 🔴 Critical | ${title} | ${fixAvail} |\n`;
              });
            
            body += `\n### Remediation\n\`\`\`bash\nnpm audit fix\n# or for breaking changes:\nnpm audit fix --force\n\`\`\`\n`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Critical security vulnerability found (${new Date().toISOString().split('T')[0]})`,
              body,
              labels: ['security', 'critical', 'automated'],
            });

      # Outdated packages report
      - name: Outdated packages report
        run: |
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          npm outdated --json 2>/dev/null | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              try {
                const data = JSON.parse(chunks.join(''));
                const entries = Object.entries(data);
                if (entries.length === 0) {
                  process.stdout.write('All packages are at their specified versions.\n');
                  return;
                }
                process.stdout.write('| Package | Current | Wanted | Latest | Type |\n');
                process.stdout.write('|---------|---------|--------|--------|------|\n');
                entries.forEach(([name, v]) => {
                  const stale = v.latest !== v.current ? '⚠' : '✓';
                  process.stdout.write(\`| \${stale} \${name} | \${v.current} | \${v.wanted} | \${v.latest} | \${v.type} |\n\`);
                });
              } catch(e) {
                process.stdout.write('No outdated packages found.\n');
              }
            });
          " >> $GITHUB_STEP_SUMMARY || echo "Could not fetch outdated packages"

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_number }}
          path: audit-report.json
          retention-days: 30

  node-version-check:
    name: 📋 Node Version Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Node version files consistency
        run: |
          echo "## Node Version File Status" >> $GITHUB_STEP_SUMMARY
          
          check_file() {
            if [ -f "$1" ]; then
              VER=$(cat "$1" | tr -d '[:space:]')
              echo "| ✓ \`$1\` | \`$VER\` |" >> $GITHUB_STEP_SUMMARY
              echo "$VER"
            else
              echo "| ✗ \`$1\` | missing |" >> $GITHUB_STEP_SUMMARY
              echo "missing"
            fi
          }
          
          echo "| File | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          check_file ".nvmrc"
          check_file ".node-version"
          
          # Check package.json engines field
          if [ -f "package.json" ]; then
            ENGINES=$(node -e "const p=require('./package.json'); console.log(p.engines?.node || 'not set')")
            echo "| \`package.json engines.node\` | \`$ENGINES\` |" >> $GITHUB_STEP_SUMMARY
            if [ "$ENGINES" == "not set" ]; then
              echo "::warning::No engines.node field in package.json — add: { node: '>=24.0.0' }"
            fi
          fi
          
          # Check CI workflows reference node 24
          WORKFLOW_NODES=$(grep -r "node-version:" .github/workflows/ 2>/dev/null | grep -oP '"\d+"' | tr -d '"' | sort -u)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Node versions in CI workflows:** $WORKFLOW_NODES" >> $GITHUB_STEP_SUMMARY
