<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Asante Andi Consulting</title>

    <!--
      GitHub Pages SPA Routing Fix
      ─────────────────────────────────────────────────────────────────────────
      GitHub Pages serves a 404 for any URL that isn't a real file (e.g.
      /services, /contact). This script encodes the current path into a query
      string and redirects to index.html, where the companion script in
      index.html decodes it and restores the original URL before React Router
      takes over.

      Credit: https://github.com/rafgraph/spa-github-pages
      ─────────────────────────────────────────────────────────────────────────
    -->
    <script>
      // Number of path segments to keep.
      // 0 = custom domain (asanteandi.co.za)  → use 0
      // 1 = project site (username.github.io/repo) → use 1
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
